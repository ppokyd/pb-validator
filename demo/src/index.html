<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prebid Adapter Validator — Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0LWKPKCY4J"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());

      gtag('config', 'G-0LWKPKCY4J');
    </script>
    <header>
      <div class="logo">
        <div class="logo-mark"></div>
        <span class="logo-name">Prebid Adapter Validator</span>
        <span class="logo-sep logo-hide-mobile">&mdash;</span>
        <span class="logo-tag logo-hide-mobile">Demo</span>
      </div>
      <div class="header-right">
        <a class="pkg-badge" href="https://www.npmjs.com/package/@ppokyd/pb-validator" target="_blank" rel="noopener noreferrer"
          >@ppokyd/pb-validator</a
        >
      </div>
    </header>
    <div class="layout">
      <aside class="panel" id="bidderPanel">
        <div class="panel-head">
          <span class="panel-title">Bidders <span class="bidder-current" id="bidderCurrent"></span></span>
          <span class="panel-count" id="bidderCount">&mdash;</span>
        </div>
        <div class="search-bar">
          <input class="search-input" id="searchInput" type="text" placeholder="Search&hellip;" autocomplete="off" spellcheck="false" />
        </div>
        <div class="bidder-list" id="bidderList">
          <div class="list-msg">Loading&hellip;</div>
        </div>
      </aside>
      <section class="panel" id="schemaPanel">
        <div class="panel-head">
          <span class="panel-title"
            >Schema &mdash; <span id="schemaLabel" class="accent">&mdash;</span
            ><a id="docLink" class="doc-link" href="#" target="_blank" rel="noopener noreferrer" hidden>source ↗</a></span
          >
          <button class="action-btn" id="copyBtn">copy</button>
        </div>
        <div class="schema-body">
          <pre class="schema-pre" id="schemaPre"><span class="muted">Select a bidder.</span></pre>
        </div>
      </section>
      <section class="panel" id="paramsPanel">
        <div class="panel-head">
          <span class="panel-title">Params</span>
          <div class="panel-head-right">
            <span class="json-status" id="jsonStatus"></span>
            <button class="action-btn" id="copyParamsBtn">copy</button>
          </div>
        </div>
        <div id="schemaHints" class="schema-hints" hidden></div>
        <div class="params-body">
          <textarea id="paramsEditor" class="params-editor" spellcheck="false" placeholder='{ "key": "value" }'></textarea>
        </div>
        <div class="action-bar">
          <button class="btn-ghost btn-generate" id="generateBtn">Generate</button>
          <button class="btn-primary" id="validateBtn">Validate</button>
          <button class="btn-ghost" id="clearBtn">Clear</button>
        </div>
        <div class="result-area" id="resultArea">
          <p class="result-idle">Enter params or press Generate, then Validate.</p>
        </div>
      </section>
    </div>
    <footer class="copyright">&copy; 2026 Prebid Adapter Validator &mdash; Apache 2.0 License</footer>
  </body>
</html>
