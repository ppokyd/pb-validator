name: Sync Prebid docs schemas

on:
  schedule:
    # Weekly: Mondays 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-prebid-docs
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache-dependency-path: go.sum

      - name: Sync schemas from prebid.github.io
        run: go run ./tools/sync-prebid-docs -out schemas

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(schemas): sync pbjs from prebid.github.io"
          title: "chore(schemas): sync pbjs schemas from prebid.github.io"
          body: |
            Automated update from `tools/sync-prebid-docs`, cloning [prebid.github.io](https://github.com/prebid/prebid.github.io) `dev-docs/bidders` on the default ref (`master`).

            - Check `schemas/manifest.json` → `sources.prebid_github_io.commit` for the pinned documentation revision.
            - Generated files are permissive object schemas (`additionalProperties: true`) until table-level constraints are implemented.

            `workflow_dispatch` runs this job on demand; the schedule runs it weekly.
          branch: chore/sync-prebid-docs
          delete-branch: true
