name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install and test
        run: |
          npm ci
          npm -w packages/js test

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/go/go.mod

      - name: Test
        run: go test -race -count=1 ./...
        working-directory: packages/go

      - name: Vet
        run: go vet ./...
        working-directory: packages/go

  publish-js:
    needs: [test-js, test-go]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install
        run: npm ci

      - name: Set version from release tag
        working-directory: packages/js
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version

      - name: Publish to npm
        working-directory: packages/js
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-go:
    needs: [test-js, test-go]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/go/go.mod

      - name: Create Go sub-module tag
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          GO_TAG="packages/go/v${VERSION}"
          echo "go_tag=$GO_TAG" >> "$GITHUB_ENV"
          git tag "$GO_TAG"
          git push origin "$GO_TAG"

      - name: Request Go module proxy indexing
        run: |
          MODULE="github.com/${{ github.repository }}/packages/go"
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "Requesting proxy to index ${MODULE}@v${VERSION}"
          GOPROXY=https://proxy.golang.org go list -m "${MODULE}@v${VERSION}"
