name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/js
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/js/package-lock.json

      - name: Install and test
        run: |
          npm ci
          npm test
